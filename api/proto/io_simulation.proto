syntax = "proto3";

package io_simulator;

// 设置 Go 生成代码的包路径
option go_package = "./api/pb";

service IOSimulationEngine {
  // 双向流通信：前端发送控制，后端推送状态
  rpc StreamSimulation(stream SimControlCommand) returns (stream SystemSnapshot);
}

message SimControlCommand {
  enum Action {
    ACTION_INIT = 0;
    ACTION_STEP_NEXT = 1;
    ACTION_INJECT_FAULT = 2;
  }
  Action action = 1;
  ReadRequestConfig config = 2;
  FaultType injected_fault = 3;
  UserContext user_context = 4;
}

message ReadRequestConfig {
  string file_path = 1;
  uint32 bytes_to_read = 2;
  uint64 user_buffer_addr = 3;
  bool use_double_buffer = 4;
  bool use_page_cache = 5;      // 是否启用页缓存 (Page Cache)
}

enum FaultType {
  FAULT_NONE = 0;
  FAULT_PERMISSION_DENIED = 1;
  FAULT_INVALID_ADDRESS = 2;
  FAULT_HARDWARE_TIMEOUT = 3;
  FAULT_PATH_TRAVERSAL = 4;
  FAULT_FILE_NOT_FOUND = 5;
  FAULT_EAGAIN = 6;              // 设备忙，可重试 (非终态)
}

message UserContext {
  uint32 uid = 1;
  uint32 gid = 2;
  string username = 3;
  string home_dir = 4;
}

message SystemSnapshot {
  enum Layer {
    LAYER_USER = 0;
    LAYER_INDEPENDENT = 1;
    LAYER_DRIVER = 2;
    LAYER_INTERRUPT = 3;
    LAYER_HARDWARE = 4;
  }
  Layer current_active_layer = 1;
  string step_description = 2;
  ProcessBlock process_state = 3;
  MemoryView memory_state = 4;
  HardwareView hardware_state = 5;
  bool is_finished = 6;
  string final_error_code = 7;
  int32 sub_step = 8;        // 当前层内子步骤序号 (1-based)
  int32 total_sub_steps = 9; // 当前层的子步骤总数
}

message ProcessBlock {
  uint32 pid = 1;
  enum State { STATE_RUNNING = 0; STATE_BLOCKED = 1; STATE_READY = 2; }
  State state = 2;
  string wait_reason = 3;
}

message MemoryView {
  bytes user_buffer_data = 1;
  bytes kernel_buffer_1_data = 2;
  bytes kernel_buffer_2_data = 3;
  string current_irp_info = 4;
  int32 active_write_buffer = 5;
  int32 active_read_buffer = 6;
  int32 current_chunk = 7;
  int32 total_chunks = 8;
  bool cache_hit = 9;           // 当前读是否页缓存命中
  uint32 cached_pages = 10;     // 缓存中的总页数
  uint32 retry_count = 11;      // EAGAIN 重试计数
  uint32 retry_max = 12;        // EAGAIN 最大重试次数
}

message HardwareView {
  string cmd_register = 1;
  string status_register = 2;
  bytes data_register = 3;
  // DMA 控制器寄存器
  string dma_source = 4;       // DMA 源地址 (如 "0x0000: Disk0 Sector 0x400")
  string dma_destination = 5;  // DMA 目标地址 (如 "0xBEEF1000: Kernel Buf1")
  uint32 dma_count = 6;        // DMA 传输字节数
  string dma_status = 7;       // DMA 状态: IDLE / SETUP / TRANSFERRING / DONE
}