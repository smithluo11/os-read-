server {
    listen 80;
    server_name localhost;

    # OPTIONS 预检：server 级别截获，return 204 终止，绝不透传到后端，避免 CORS 头叠加
    if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' '*' always;
        add_header 'Access-Control-Expose-Headers' 'grpc-status,grpc-message' always;
        return 204;
    }

    # gRPC-Web 代理块：后端自带 grpcweb.WrapServer，故使用 proxy_pass 透传 HTTP/1.1 流量
    location /io_simulator.IOSimulationEngine/ {
        proxy_pass http://backend:18083;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # 故意不在此处 add_header 任何 CORS 响应头，直接透传 Go 后端自带的单组 CORS 头
    }

    # 前端静态文件兜底
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
