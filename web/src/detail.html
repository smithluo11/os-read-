<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>层级详情 — OS I/O 模拟器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  body { overflow: hidden; }
  .detail-bar {
    display: flex; align-items: center; gap: 16px;
    padding: 0 24px; height: 56px;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
  }
  .btn-back {
    font-family: var(--sans); font-size: 12px; font-weight: 600;
    padding: 6px 14px; border: 1px solid var(--border); border-radius: var(--radius);
    cursor: pointer; background: var(--bg-panel); color: var(--ink-muted);
    transition: all var(--transition-fast);
  }
  .btn-back:hover { color: var(--phosphor); border-color: var(--phosphor); }
  .detail-bar .logo { font-family: var(--mono); font-weight: 700; font-size: 16px; color: var(--phosphor); letter-spacing: 2px; }
  .detail-bar .sep { color: var(--ink-dim); font-size: 13px; margin: 0 4px; }
  .detail-bar .layer-title { font-family: var(--sans); font-weight: 700; font-size: 14px; color: var(--ink-bright); }

  .detail-grid {
    display: grid;
    grid-template-columns: 5fr 5fr;
    gap: 20px; padding: 20px;
    height: calc(100vh - 56px);
    box-sizing: border-box;
  }

  .detail-card {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    box-shadow: var(--shadow-sm);
    overflow-y: auto;
  }

  .detail-card h3 {
    font-family: var(--sans); font-size: 13px; font-weight: 700;
    color: var(--ink-bright); margin: 0 0 12px 0;
    text-transform: uppercase; letter-spacing: 1px;
    border-bottom: 1px solid var(--border-light); padding-bottom: 8px;
  }

  /* Mini topology with SVG lines */
  .mini-topo {
    position: relative; width: 100%; height: 260px;
    background: var(--bg-deep); border-radius: var(--radius);
    border: 1px solid var(--border-light); margin-bottom: 14px;
  }
  .mini-topo svg { position: absolute; inset: 0; width: 100%; height: 100%; }
  .mini-layer {
    position: absolute; left: 50%; transform: translateX(-50%);
    background: var(--bg-panel); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 14px; font-size: 11px;
    font-family: var(--sans); white-space: nowrap; z-index: 2;
    transition: all 0.4s;
  }
  .mini-layer.highlight {
    border-color: var(--phosphor); background: var(--phosphor-soft);
    font-weight: 700; color: var(--phosphor-dim);
    box-shadow: 0 0 10px var(--phosphor-glow);
    transform: translateX(-50%) scale(1.08);
  }
  .mini-layer .tag { font-weight: 700; margin-right: 4px; }
  .mini-arrow {
    position: absolute; left: 50%; transform: translateX(-50%);
    font-size: 14px; z-index: 1; color: var(--ink-dim);
    font-family: var(--mono);
  }

  /* IO flow */
  .io-flow { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .io-row { display: flex; align-items: flex-start; gap: 10px; font-family: var(--mono); font-size: 13px; }
  .io-row .detail { font-family: var(--sans); font-size: 12px; color: var(--ink-muted); line-height: 1.5; }
  .io-tag {
    padding: 2px 8px; border-radius: 4px; font-weight: 700; font-size: 11px;
    font-family: var(--sans); min-width: 36px; text-align: center; flex-shrink: 0;
  }
  .io-tag.in  { background: var(--phosphor-soft); color: var(--phosphor-dim); }
  .io-tag.out { background: var(--cobalt-soft); color: var(--cobalt); }

  /* Sub-steps list */
  .substep-list { list-style: none; padding: 0; }
  .substep-list li {
    padding: 10px 0 10px 0; position: relative;
    font-size: 13px; line-height: 1.7; color: var(--ink);
    border-bottom: 1px solid var(--border-light);
    font-family: var(--sans);
    display: flex; gap: 12px; align-items: flex-start;
  }
  .substep-num {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--phosphor-soft); color: var(--phosphor-dim);
    font-size: 12px; font-weight: 700; text-align: center; line-height: 28px;
    font-family: var(--mono); flex-shrink: 0;
  }
  .substep-list li.fault .substep-num { background: #fde8e8; color: #dc2626; }
  .substep-desc { flex: 1; }
  .substep-desc code { font-family: var(--mono); font-size: 12px; background: var(--bg-deep); padding: 1px 6px; border-radius: 3px; }
  .substep-desc .badge-fault { font-size: 10px; padding: 1px 6px; border-radius: 3px; background: #fde8e8; color: #dc2626; margin-left: 6px; }

  /* Code block */
  .code-block {
    background: var(--bg-deep); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px;
    overflow-x: auto; font-family: var(--mono); font-size: 12px;
    line-height: 1.8; color: var(--ink);
  }
  .code-block .kw { color: var(--cyan); }
  .code-block .fn { color: var(--phosphor-dim); font-weight: 600; }
  .code-block .cm { color: var(--ink-dim); font-style: italic; }
  .code-block .str { color: #059669; }

  /* Data structures */
  .ds-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .ds-table th {
    text-align: left; padding: 6px 10px;
    font-family: var(--sans); font-weight: 700; color: var(--ink-dim);
    border-bottom: 2px solid var(--border); font-size: 10px; text-transform: uppercase;
  }
  .ds-table td {
    padding: 6px 10px; border-bottom: 1px solid var(--border-light);
    font-family: var(--mono); color: var(--ink);
  }
  .ds-table .field-type { color: var(--cyan); font-size: 11px; }
  .ds-table .field-name { color: var(--phosphor-dim); font-weight: 600; }
  .ds-table .field-desc { font-family: var(--sans); font-size: 11px; color: var(--ink-muted); }

  @media (max-width: 900px) {
    .detail-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="detail-bar">
  <button class="btn-back" onclick="history.back()">← 返回拓扑图</button>
  <span class="logo">IO::SIM</span>
  <span class="sep">/</span>
  <span class="layer-title" id="detail-title">层级详情</span>
</div>

<div class="detail-grid">
  <!-- 左栏：层定位 + 数据流 + 数据结构 -->
  <div class="detail-card">
    <h3>层级定位</h3>
    <div class="mini-topo" id="mini-topo"></div>

    <div class="io-flow" id="io-flow"></div>

    <h3>关键数据结构</h3>
    <table class="ds-table" id="ds-table"><tbody></tbody></table>
  </div>

  <!-- 右栏：子步骤流程 + 伪代码 -->
  <div class="detail-card">
    <h3>sys_read() 子步骤流程（与模拟器引擎一致）</h3>
    <ul class="substep-list" id="substep-list"></ul>

    <h3 style="margin-top:20px;">引擎核心逻辑 / 伪代码</h3>
    <div class="code-block" id="code-block"></div>
  </div>
</div>

<script>
// ============================================================
//  各层数据 — 严格对应 internal/engine/engine.go 子步骤
// ============================================================
var layers = {
  USER: {
    tag: 'L0', name: '用户层 I/O 软件', color: '#0891b2',
    summary: 'C 库调用 → fd 表查找 → access_ok() 校验 → 陷入内核',
    input:  { text: '进程用户空间', detail: '应用程序调用 fread(buf, size, nmemb, fp)，C 库提取 fd，封装为 read(fd, buf, len) 系统调用' },
    output: { text: '陷入内核 → VFS 层', detail: '通过 int 0x80 / sysenter 切换 Ring0，寄存器传参 (eax=3, ebx=fd, ecx=buf, edx=len)，跳转 sys_read()' },
    substeps: [
      { n: 1, desc: '<b>库函数调用</b>：进程调用 <code>fread(buf, size, nmemb, fp)</code> → libc 从 <code>FILE*</code> 提取 <code>fd</code>，调用 <code>read(fd, buf, len)</code> 封装函数' },
      { n: 2, desc: '<b>fd 表查找</b>：遍历进程打开文件表 <code>fd_table[fd]</code> → <code>OpenFileEntry{path, flags, pos, inode}</code>。若 fd 无效返回 <code>EBADF</code>，若 flags=O_WRONLY 拒绝读取' },
      { n: 3, desc: '<b>access_ok() 校验</b>：验证用户缓冲区地址 <code>buf</code> 在 <code>[0, TASK_SIZE)</code> 范围内。若越界返回 <code>EFAULT</code>，进程收到 SIGSEGV' },
      { n: 4, desc: '<b>陷入内核</b>：参数装入寄存器 (eax=NR_read=3, ebx=fd, ecx=buf, edx=len)。执行 <code>int 0x80</code>，CPU 硬件压栈 SS/ESP/EFLAGS/CS/EIP，切换 Ring0，跳转 <code>sys_read()</code>' }
    ],
    faults: [2, 3],
    code: '// L0 用户层 — engine.go executeUserLayer() 4 子步骤\nfunc (e *SimulationEngine) executeUserLayer() {\n    switch e.SubStep {\n    case 1: // fread() → libc → syscall wrapper\n        desc = "fread(buf, size, nmemb, fp) → read(fd, buf, len)"\n\n    case 2: // fd 表查找：fd_table[fd] → file* → inode\n        entry := e.FdTable[findByFd(e.CurrentFd)]\n        if entry.Flags == O_WRONLY → EBADF\n\n    case 3: // access_ok(buf, len) 地址校验\n        if addr >= TASK_SIZE → EFAULT + SIGSEGV\n\n    case 4: // 陷入内核 int 0x80\n        e.nextLayer(LAYER_INDEPENDENT)\n    }\n}',
    ds: [
      { type: 'OpenFileEntry', field: 'Fd int32', desc: '文件描述符 (如 3)' },
      { type: 'OpenFileEntry', field: 'FilePath string', desc: '关联的文件路径' },
      { type: 'OpenFileEntry', field: 'Flags int32', desc: '打开标志 (0=O_RDONLY, 1=O_WRONLY)' },
      { type: 'OpenFileEntry', field: 'FilePos int64', desc: '当前文件读写偏移量' },
      { type: 'OpenFileEntry', field: 'InodePtr string', desc: '指向 inode 的指针标识 (如 inode:0xBEEF)' },
      { type: 'SimulationEngine', field: 'FdTable []*OpenFileEntry', desc: '进程打开文件表 (当前含 fd=3)' },
      { type: 'SimulationEngine', field: 'CurrentFd int32', desc: '当前 read() 操作的文件描述符' }
    ]
  },
  VFS: {
    tag: 'L1', name: '设备无关软件 (VFS)', color: '#0891b2',
    summary: '路径解析 → ACL 校验 → 页缓存查找 → 缓冲分配 → IRP 下发',
    input:  { text: 'IRP ← 用户层', detail: '系统调用参数 {fd, buf, len} + 进程凭证 {uid, gid}，由 sys_read() 传递至 vfs_read()' },
    output: { text: 'IRP → 驱动层 (或直接返回)', detail: 'IRP_READ {Dev:Disk0, Len, Buf}。若页缓存命中则直接 copy_to_user() 返回，跳过磁盘 I/O' },
    substeps: [
      { n: 1, desc: '<b>路径解析</b>：VFS 将路径 <code>"/home/user1/notes.txt"</code> 解析为 <code>dentry → inode</code>，遍历目录项缓存 (dcache)，定位文件在文件系统中的准确位置' },
      { n: 2, desc: '<b>ACL 权限校验</b>：4 级管线 — ①路径穿越检测 ②文件存在检查 ③敏感文件检查 (<code>/etc/shadow</code>) ④Unix 权限位 (UID/GID 匹配 owner/group/other)。任意一级失败返回对应错误码' },
      { n: 3, desc: '<b>页缓存查找</b>：检查 <code>PageCache[filePath]</code> 是否存在。命中 → 直接从 RAM 拷贝数据到用户缓冲区，<code>IsFinished=true</code>，跳过 L2/L3/L4。未命中 → 分配新页框，继续下发' },
      { n: 4, desc: '<b>内核缓冲分配</b>：根据 <code>UseDoubleBuffer</code> 配置分配 单缓冲区 或 双缓冲乒乓 A/B（共 <code>TotalChunks × 4096</code> 字节）' },
      { n: 5, desc: '<b>IRP 构造与下发</b>：构造 <code>IRP_READ → Dev:Disk0, Len:N, Buf:0xNNNN</code>，沿设备栈提交至驱动程序层' }
    ],
    faults: [2],
    code: '// L1 VFS 层 — engine.go executeIndependentLayer() 5 子步骤\nfunc (e *SimulationEngine) executeIndependentLayer() {\n    switch e.SubStep {\n    case 1: // 路径解析 dentry → inode\n        desc = "VFS 将路径解析为 dentry → inode"\n\n    case 2: // ACL 四阶段管线校验\n        ValidateFileAccess(userCtx, filePath)\n        // 路径穿越 → EPERM / 敏感文件 → EACCES /\n        // 不存在 → ENOENT / 权限位 → EACCES\n\n    case 3: // 页缓存查找 (Page Cache)\n        if cached, ok := PageCache[filePath]; ok {\n            UserBufferData = cached[:bytesToRead]\n            IsFinished = true  // 跳过磁盘 I/O!\n        } else {\n            CacheMissed = true\n        }\n\n    case 4: // 缓冲分配 (单/双)\n        desc = "单/双缓冲分配"\n\n    case 5: // IRP 构造 → 驱动层\n        IRP = "IRP_READ → Dev:Disk0, Len, Buf"\n        nextLayer(LAYER_DRIVER)\n    }\n}',
    ds: [
      { type: 'SimulationEngine', field: 'PageCache map[string][]byte', desc: '内核文件页缓存 (key=filePath)' },
      { type: 'SimulationEngine', field: 'CacheMissed bool', desc: '当前读是否缓存未命中 (ISR 完成后回写)' },
      { type: 'Config', field: 'UsePageCache bool', desc: '是否启用页缓存功能' },
      { type: 'Config', field: 'UseDoubleBuffer bool', desc: '双缓冲乒乓 (true) / 单缓冲 (false)' },
      { type: 'Snapshot', field: 'TotalChunks int32', desc: '总数据块数 = ceil(bytesToRead/4096)' },
      { type: 'MemoryView', field: 'CachedPages uint32', desc: '缓存中的总页框数' },
      { type: 'MemoryView', field: 'CacheHit bool', desc: '当前读是否页缓存命中' }
    ]
  },
  DRV: {
    tag: 'L2', name: '设备驱动程序', color: '#d97706',
    summary: 'IRP 解析 → 寄存器编程 (可 EAGAIN 重试) → 进程阻塞',
    input:  { text: 'IRP ← VFS 层', detail: 'IRP_READ {Dev:Disk0, Len:N, Buf:0xNNNN}，内核缓冲区已分配就绪' },
    output: { text: '硬件指令 → 磁盘控制器', detail: 'CMD_REG=0x01 READ_SECTOR, STS_REG=DEVICE_BUSY。进程进入 BLOCKED 状态，CPU 调度其他进程' },
    substeps: [
      { n: 1, desc: '<b>IRP 解析</b>：提取操作类型 (READ)、目标设备 (Disk0)、数据量 (单缓冲全量 / 双缓冲 chunk N/M × 4096 字节)' },
      { n: 2, desc: '<b>寄存器编程 + EAGAIN 重试</b>：通过 MMIO 写入 <code>CMD_REG=0x01: READ_SECTOR</code>, <code>STS_REG=DEVICE_BUSY</code>。若设备忙 (EAGAIN)，重试最多 3 次，每次重试重新写入寄存器' },
      { n: 3, desc: '<b>进程阻塞</b>：进程进入 <code>BLOCKED</code> 状态，等待原因="等待磁盘 I/O 完成 (DMA + IRQ)"，CPU 调度器切换到其他就绪进程' }
    ],
    faults: [2],
    code: '// L2 驱动层 — engine.go executeDriverLayer() 3 子步骤\nfunc (e *SimulationEngine) executeDriverLayer() {\n    switch e.SubStep {\n    case 1: // IRP 解析\n        desc = "提取 IRP: READ, Disk0, len"\n\n    case 2: // 寄存器编程 + EAGAIN 重试\n        if fault == EAGAIN && retryCount < retryMax:\n            retryCount++\n            desc = "设备忙 重试 {retryCount}/{retryMax}"\n            e.SubStep = 1  // 保持当前子步骤\n            return\n\n        // 重试耗尽：正常编程\n        CMD_REG = "0x01: READ_SECTOR"\n        STS_REG = "DEVICE_BUSY"\n        retryCount = 0\n\n    case 3: // 进程阻塞\n        process.state = BLOCKED\n        nextLayer(LAYER_HARDWARE)\n    }\n}',
    ds: [
      { type: 'SimulationEngine', field: 'RetryCount uint32', desc: 'EAGAIN 当前重试次数' },
      { type: 'SimulationEngine', field: 'RetryMax uint32', desc: '最大重试次数 (默认 3)' },
      { type: 'SimulationEngine', field: 'InjectedFault FaultType', desc: '注入的故障类型 (含 FAULT_EAGAIN=6)' },
      { type: 'HardwareView', field: 'CmdRegister string', desc: '命令寄存器 (如 0x01: READ_SECTOR)' },
      { type: 'HardwareView', field: 'StatusRegister string', desc: '状态寄存器 (DEVICE_BUSY / READY)' },
      { type: 'ProcessBlock', field: 'State enum', desc: '进程状态: RUNNING(0) / BLOCKED(1) / READY(2)' }
    ]
  },
  HW: {
    tag: 'L4', name: '硬件层 (磁盘控制器)', color: '#d97706',
    summary: 'DMA 初始化 → 磁盘扇区读取/DMA 传输 → 硬件中断 IRQ',
    input:  { text: '设备指令 ← 驱动程序', detail: 'CMD_REG=READ_SECTOR, 扇区地址, DMA 目标缓冲区地址由驱动层写入设备端口' },
    output: { text: 'IRQ↑ 中断信号 → ISR', detail: 'DMA 传输完成 → STS_REG=DATA_READY → 中断控制器拉高 IRQ#14 → CPU 查 IDT 跳转 ISR 入口' },
    substeps: [
      { n: 1, desc: '<b>DMA 控制器初始化</b>：编程 DMA 寄存器 — <code>源地址=磁盘扇区</code>, <code>目标=内核缓冲区</code>, <code>传输字节数</code>。DMA 控制器接管总线，CPU 可继续执行。状态: SETUP' },
      { n: 2, desc: '<b>磁盘读取 + DMA 传输</b>：磁头寻道，扇区数据通过 DMA 直接写入内核缓冲区 (无需 CPU 逐字节搬运)。数据写入 DATA_REG。状态: TRANSFERRING → DONE。<b>若硬件超时 (EIO)</b>：DMA 状态 → ERROR，STS_REG=DEVICE_ERROR' },
      { n: 3, desc: '<b>硬件中断 IRQ 发出</b>：磁盘控制器通过 IRQ 线 (IRQ#14) 向 CPU 发出中断请求。PIC/APIC 将中断向量号传递给 CPU，触发中断处理流程' }
    ],
    faults: [2],
    code: '// L4 硬件层 — engine.go executeHardwareLayer() 3 子步骤\nfunc (e *SimulationEngine) executeHardwareLayer() {\n    switch e.SubStep {\n    case 1: // DMA 控制器初始化\n        DmaSource   = "0x0400: Disk0 Sector"\n        DmaDest     = "0xBEEF1000: Kernel Buf1"\n        DmaCount    = bytesToRead\n        DmaStatus   = "SETUP"\n\n    case 2: // 磁盘读取 + DMA 传输\n        if fault == EIO:\n            DmaStatus = "ERROR"\n            IsFinished = true\n            return\n\n        DataRegister = generated_data[:actualSize]\n        DmaStatus    = "TRANSFERRING" → "DONE"\n        STS_REG      = "DATA_READY"\n\n    case 3: // 硬件中断 IRQ#14\n        nextLayer(LAYER_INTERRUPT)\n    }\n}',
    ds: [
      { type: 'HardwareView', field: 'DmaSource string', desc: 'DMA 源地址 (如 0x0400: Disk0 Sector)' },
      { type: 'HardwareView', field: 'DmaDestination string', desc: 'DMA 目标地址 (如 0xBEEF1000: Kernel Buf1)' },
      { type: 'HardwareView', field: 'DmaCount uint32', desc: 'DMA 传输字节数' },
      { type: 'HardwareView', field: 'DmaStatus string', desc: 'IDLE → SETUP → TRANSFERRING → DONE / ERROR' },
      { type: 'HardwareView', field: 'CmdRegister string', desc: '命令寄存器 (READ_SECTOR)' },
      { type: 'HardwareView', field: 'StatusRegister string', desc: '状态寄存器 (READY/BUSY/ERROR/DATA_READY)' },
      { type: 'HardwareView', field: 'DataRegister []byte', desc: '硬件数据寄存器 (DMA 目的)' }
    ]
  },
  INT: {
    tag: 'L3', name: '中断处理程序 (ISR)', color: '#6366f1',
    summary: 'ISR 接管 → copy_to_user 数据拷贝 → 乒乓切换/完成 + 缓存回写',
    input:  { text: 'IRQ 中断 ← 硬件层', detail: 'CPU 响应 IRQ#14，硬件自动压栈 (EIP/CS/EFLAGS)，查 IDT 跳转 ISR 入口，保存寄存器上下文' },
    output: { text: '数据返回 → 用户空间', detail: 'copy_to_user() 将内核缓冲区数据拷贝至用户空间 buf=0x10000000。进程恢复 RUNNING，ISR 执行 iret 返回用户态' },
    substeps: [
      { n: 1, desc: '<b>ISR 接管</b>：CPU 响应 IRQ#14，硬件自动压栈 (EIP/CS/EFLAGS)。ISR 入口保存寄存器上下文，读取中断源识别为磁盘控制器' },
      { n: 2, desc: '<b>数据拷贝</b>：① 硬件 DATA_REG → 内核缓冲区 (ActiveWriteBuffer) ② <code>copy_to_user()</code> → 用户缓冲区 <code>0x10000000</code>。累计已接收字节数，清空硬件 DATA_REG，STS_REG 复位 READY' },
      { n: 3, desc: '<b>乒乓切换 / I/O 完成</b>：<b>若还有未读 chunk</b>：缓冲区切换 (A↔B)，编程下一块 DMA，进程再次阻塞，回到 L2 驱动层。<b>若全部完成</b>：进程恢复 RUNNING，<code>sys_read()</code> 返回字节数，更新文件偏移量，<b>页缓存回写</b>（将数据存入 PageCache），IsFinished=true' }
    ],
    faults: [],
    code: '// L3 中断层 — engine.go executeInterruptLayer() 3 子步骤\nfunc (e *SimulationEngine) executeInterruptLayer() {\n    switch e.SubStep {\n    case 1: // ISR 接管 + 上下文保存\n        desc = "CPU 响应 IRQ#14, 压栈, ISR 入口"\n\n    case 2: // 数据拷贝 (hw reg → kernel buf → user buf)\n        KernelBuf[activeWrite] = HardwareState.DataRegister\n        UserBuf = append(UserBuf, KernelBuf[activeWrite]...)\n        DataRegister = []byte{}  // 清空硬件寄存器\n\n    case 3: // 乒乓切换 或 I/O 完成\n        if UseDoubleBuffer && chunk+1 < totalChunks:\n            chunk++\n            // 乒乓: 写缓冲 ↔ 读缓冲\n            swap(ActiveWriteBuffer, ActiveReadBuffer)\n            nextLayer(LAYER_DRIVER)  // 回到 L2 继续\n        else:\n            // I/O 完成\n            ProcessState = RUNNING\n            FilePos += bytesRead     // 更新文件偏移量\n            if CacheMissed:          // 页缓存回写\n                PageCache[filePath] = UserBuf\n            IsFinished = true\n    }\n}',
    ds: [
      { type: 'SimulationEngine', field: 'ActiveWriteBuffer int32', desc: '乒乓写入目标 (1=A, 2=B)' },
      { type: 'SimulationEngine', field: 'ActiveReadBuffer int32', desc: '乒乓读取源' },
      { type: 'SimulationEngine', field: 'CurrentChunk int32', desc: '当前数据块索引 (0-based)' },
      { type: 'MemoryView', field: 'KernelBuffer_1Data []byte', desc: '内核缓冲区 A (4KB/块)' },
      { type: 'MemoryView', field: 'KernelBuffer_2Data []byte', desc: '内核缓冲区 B' },
      { type: 'MemoryView', field: 'UserBufferData []byte', desc: '用户态接收缓冲区 (累积)' },
      { type: 'OpenFileEntry', field: 'FilePos int64', desc: '文件偏移量 (模拟 lseek 行为)' }
    ]
  }
};

// ---- Router ----
var params = new URLSearchParams(window.location.search);
var layerKey = params.get('layer') || 'USER';
if (!layers[layerKey]) layerKey = 'USER';
var data = layers[layerKey];

document.getElementById('detail-title').textContent = data.tag + ' ' + data.name + ' — ' + data.summary;

// ---- Mini topology with connecting arrows ----
var mini = document.getElementById('mini-topo');
var allKeys = ['USER', 'VFS', 'DRV', 'HW', 'INT'];
var positions = {
  USER: { top: 8,  height: 40, color: '#0891b2' },
  VFS:  { top: 58, height: 40, color: '#0891b2' },
  DRV:  { top: 108, height: 40, color: '#d97706' },
  HW:   { top: 158, height: 40, color: '#d97706' },
  INT:  { top: 208, height: 40, color: '#6366f1' }
};

// SVG arrows
var arrowLines = '';
var prevPos = null;
allKeys.forEach(function(k) {
  var pos = positions[k];
  if (prevPos) {
    var y1 = prevPos.top + prevPos.height;
    var y2 = pos.top;
    var midY = (y1 + y2) / 2;
    var dir = (k === 'INT') ? '↑' : '↓';
    arrowLines += '<line x1="360" y1="' + y1 + '" x2="360" y2="' + y2 + '" stroke="' + prevPos.color + '" stroke-width="1.5" stroke-dasharray="' + (k === 'INT' ? '5,3' : '') + '" opacity="0.5"/>';
    if (k !== 'INT') {
      arrowLines += '<polygon points="356,' + (y2-5) + ' 364,' + (y2-5) + ' 360,' + y2 + '" fill="' + prevPos.color + '" opacity="0.5"/>';
    }
    if (k === 'INT') {
      arrowLines += '<polygon points="356,' + (y1+5) + ' 364,' + (y1+5) + ' 360,' + y1 + '" fill="' + positions.HW.color + '" opacity="0.5"/>';
    }
    arrowLines += '<text x="375" y="' + (midY+4) + '" font-size="9" fill="' + prevPos.color + '" font-family="JetBrains Mono" opacity="0.6">' + (k === 'INT' ? 'IRQ↑' : 'IRP↓') + '</text>';
  }
  prevPos = pos;
});
// Return path DATA↑
arrowLines += '<line x1="390" y1="' + (positions.INT.top) + '" x2="390" y2="' + (positions.VFS.top + positions.VFS.height) + '" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>';
arrowLines += '<text x="405" y="' + ((positions.INT.top + positions.VFS.top + positions.VFS.height) / 2 + 4) + '" font-size="9" fill="#6366f1" font-family="JetBrains Mono" opacity="0.5">DATA↑</text>';

mini.innerHTML = '<svg viewBox="0 0 720 260">' + arrowLines + '</svg>' +
  allKeys.map(function(k) {
    var l = layers[k];
    var pos = positions[k];
    var hl = (k === layerKey) ? ' highlight' : '';
    return '<div class="mini-layer' + hl + '" style="top:' + pos.top + 'px; border-left: 3px solid ' + pos.color + ';">' +
      '<span class="tag">' + l.tag + '</span>' + l.name + ' — ' + l.summary.substring(0, 20) + '…' +
    '</div>';
  }).join('');

// ---- IO flow ----
var flow = document.getElementById('io-flow');
flow.innerHTML =
  '<div class="io-row"><span class="io-tag in">输入</span><span style="font-weight:600;">' + data.input.text + '</span></div>' +
  '<div class="io-row"><span class="io-tag in" style="visibility:hidden">输入</span><span class="detail">' + data.input.detail + '</span></div>' +
  '<div class="io-row"><span class="io-tag out">输出</span><span style="font-weight:600;">' + data.output.text + '</span></div>' +
  '<div class="io-row"><span class="io-tag out" style="visibility:hidden">输出</span><span class="detail">' + data.output.detail + '</span></div>';

// ---- Sub-step list with fault markers ----
var substepList = document.getElementById('substep-list');
substepList.innerHTML = data.substeps.map(function(s) {
  var isFault = data.faults.indexOf(s.n) !== -1;
  return '<li' + (isFault ? ' class="fault"' : '') + '>' +
    '<span class="substep-num">' + s.n + '</span>' +
    '<span class="substep-desc">' + s.desc + (isFault ? '<span class="badge-fault">故障拦截点</span>' : '') + '</span>' +
  '</li>';
}).join('');

// ---- Pseudo-code ----
document.getElementById('code-block').innerHTML = '<pre>' + data.code + '</pre>';

// ---- Data structures table ----
var tbody = document.querySelector('#ds-table tbody');
tbody.innerHTML = data.ds.map(function(d) {
  return '<tr>' +
    '<td class="field-type">' + d.type + '</td>' +
    '<td class="field-name">' + d.field + '</td>' +
    '<td class="field-desc">' + d.desc + '</td>' +
  '</tr>';
}).join('');
</script>
</body>
</html>
