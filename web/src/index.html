<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OS I/O 模拟器 — VFS 与双缓冲 demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  /* ====== 终极排版重写：全高伸展版 ====== */
  
  /* 1. 全局三栏重构 */
  .main-grid {
    display: grid !important;
    grid-template-columns: minmax(300px, 1.2fr) 440px minmax(320px, 1fr) !important;
    gap: 16px !important;
    padding: 16px !important;
    max-width: 1600px;
    margin: 0 auto;
    height: calc(100vh - 60px) !important; /* 锁定屏幕总高度 */
    box-sizing: border-box;
  }

  /* 2. 左右两侧面板：强制占满 100% 高度，开启 Flex 纵向排布 */
  .panel-control, .panel-info {
    height: 100% !important; /* 关键：向下撑满 */
    padding: 16px !important;
    border-radius: 12px;
    border: 1px solid var(--border) !important;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    background: var(--bg-panel) !important;
    display: flex !important;
    flex-direction: column !important;
    box-sizing: border-box;
  }

  /* 3. 左侧控制面板：自动均匀分配垂直空间，告别上半截拥挤 */
  .panel-control {
    justify-content: flex-start !important;
    gap: 8px !important;
  }
  .panel-control .field {
    margin-bottom: 0 !important;
  }
  .panel-control hr {
    margin: 4px 0 !important;
  }

  /* 4. 右侧信息面板：加大卡片间距，最后一个日志框强行撑满底部 */
  .panel-info {
    gap: 10px !important;
  }
  .info-card {
    margin: 0 !important;
  }
  .info-card.log-card {
    flex: 1; /* 关键魔法：占据剩下的所有垂直空间 */
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .info-card.log-card .log-scroll {
    flex: 1;
    max-height: none !important;
    height: 0; /* Flexbox 经典滚动条占位魔法，防止内容把卡片撑爆 */
    overflow-y: auto;
    margin-top: 10px;
    padding-right: 4px;
  }

  /* 5. 中间拓扑区：保持居中与坐标系锚定 */
  .panel-topology {
    display: flex;
    justify-content: center;
    padding-top: 10px;
  }
  .topo-anchor {
    position: relative;
    width: 400px;
    height: 700px;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-left">
    <span class="logo">IO::SIM</span>
    <span class="version">v1.0</span>
  </div>
  <div class="topbar-center">
    <button id="btn-connect" class="btn btn-primary">🔌 连接后端</button>
    <button id="btn-init" class="btn btn-accent" disabled>● 发起读取</button>
    <button id="btn-step" class="btn" disabled>▶ 下一步</button>
    <button id="btn-autoplay" class="btn btn-warn hidden">⚡ 自动连点</button>
  </div>
  <div class="topbar-right">
    <span id="conn-status" class="conn-status disconnected">● 未连接</span>
  </div>
</header>

<div class="main-grid">
  <aside class="panel-control">
    <h2 class="panel-title">请求配置</h2>

    <div class="field">
      <label>后端地址</label>
      <input type="text" id="cfg-host" class="inp full" value="http://localhost:18083">
    </div>

    <div class="field">
      <label>用户身份</label>
      <select id="sel-user" class="sel full">
        <option value="user1">👤 普通用户 (uid=1000)</option>
        <option value="root">🔒 Root 用户 (uid=0)</option>
      </select>
    </div>

    <hr>

    <div class="field">
      <label>文件路径</label>
      <select id="cfg-path" class="sel full">
        <option value="/home/user1/notes.txt">/home/user1/notes.txt（普通文件）</option>
        <option value="/etc/shadow">/etc/shadow（系统敏感文件）</option>
        <option value="../../etc/shadow">../../etc/shadow（路径穿越）</option>
        <option value="/tmp/data.bin">/tmp/data.bin（设备文件）</option>
        <option value="/nonexistent">/nonexistent（文件不存在）</option>
      </select>
    </div>

    <div class="field">
      <label>读取字节数：<strong id="val-bytes">16384</strong></label>
      <input type="range" id="cfg-bytes" min="100" max="65536" value="16384" step="100" class="full">
    </div>

    <div class="field">
      <label>用户缓冲区地址：<code id="val-addr">0x10000000</code></label>
      <select id="cfg-addr" class="sel full">
        <option value="0x10000000">0x10000000（安全）</option>
        <option value="0xFFFFFFFF">0xFFFFFFFF（越界）</option>
      </select>
    </div>

    <div class="field row">
      <label>双缓冲机制</label>
      <label class="toggle">
        <input type="checkbox" id="cfg-dblbuf" checked>
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
        <span id="lbl-dblbuf" class="toggle-label">开</span>
      </label>
    </div>

    <div class="field">
      <label>注入底层故障</label>
      <select id="cfg-fault" class="sel full">
        <option value="0">正常流转 (无故障)</option>
        <option value="1">权限拒绝 (EACCES)</option>
        <option value="2">非法地址 (EFAULT)</option>
        <option value="3">硬件超时 (EIO)</option>
        <option value="4">路径穿越 (EFAULT)</option>
        <option value="5">文件不存在 (ENOENT)</option>
      </select>
    </div>
  </aside>

  <main class="panel-topology">
    <div class="topo-anchor">
      
      <svg class="topo-svg" viewBox="0 0 400 700" style="position:absolute; inset:0; width:100%; height:100%;">
        <defs>
          <marker id="arrow-down" markerWidth="8" markerHeight="8" refX="4" refY="8" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#c2c7ce"/></marker>
          <marker id="arrow-down-active" markerWidth="8" markerHeight="8" refX="4" refY="8" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#0891b2"/></marker>
          <filter id="glow-active"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>

        <line x1="200" y1="55" x2="200" y2="120" class="connector" id="conn-u-v"/>
        <line x1="200" y1="240" x2="200" y2="300" class="connector" id="conn-v-d"/>
        <line x1="140" y1="380" x2="80" y2="455" class="connector" id="conn-d-h"/>
        <line x1="260" y1="455" x2="320" y2="380" class="connector" id="conn-h-i"/>
        <path d="M340,535 C390,535 390,345 340,345" class="connector loopback" id="conn-i-d" fill="none"/>

        <foreignObject x="130" y="135" width="140" height="24"><div class="conn-label" id="irp-label">IRP ↓</div></foreignObject>
        <foreignObject x="310" y="470" width="90" height="24"><div class="conn-label" id="irq-label">IRQ ↑</div></foreignObject>
      </svg>

      <div class="layer-card" id="layer-USER" style="position:absolute; top:0px; left:50%; transform:translateX(-50%); width:240px; box-sizing:border-box; margin:0;">
        <span class="layer-tag">L0</span><span class="layer-name">用户空间</span><span class="layer-sub">sys_read(fd, buf, len)</span>
      </div>

      <div class="layer-card" id="layer-VFS" style="position:absolute; top:130px; left:50%; transform:translateX(-50%); width:280px; box-sizing:border-box; margin:0;">
        <span class="layer-tag">L1</span><span class="layer-name">设备无关层 (VFS)</span><span class="layer-sub" id="vfs-desc">等待系统调用...</span>
        <div class="buffers-row" id="vfs-buffers" style="display:flex; gap:10px; margin-top:12px; width:100%;">
          <div class="kbuf" id="kbuf1" style="flex:1; overflow:hidden; padding:10px 8px;"><span class="kbuf-label">缓冲 A</span><span class="kbuf-data"></span></div>
          <div class="kbuf" id="kbuf2" style="flex:1; overflow:hidden; padding:10px 8px;"><span class="kbuf-label">缓冲 B</span><span class="kbuf-data"></span></div>
        </div>
      </div>

      <div class="layer-card" id="layer-DRV" style="position:absolute; top:310px; left:50%; transform:translateX(-50%); width:240px; box-sizing:border-box; margin:0;">
        <span class="layer-tag">L2</span><span class="layer-name">设备驱动层</span><span class="layer-sub" id="drv-desc">等待 IRP...</span>
        <div class="pbar-wrap" style="margin-top:12px;"><div class="pbar-fill" id="pbar"></div></div>
        <span class="chunk-stat" id="chunk-stat">0 / 1</span>
      </div>

      <div class="hw-int-row" style="position:absolute; top:465px; left:50%; transform:translateX(-50%); width:360px; display:flex; justify-content:space-between;">
        <div class="layer-card hw-card" id="layer-HW" style="width:165px; box-sizing:border-box; margin:0; transform:none; left:auto;">
          <span class="layer-tag">L4</span><span class="layer-name">硬件层 (磁盘)</span><span class="layer-sub">磁盘控制器</span>
          <div class="regs" style="margin-top:12px;"><code id="hw-cmd">CMD: NO_OP</code><code id="hw-status">STS: READY</code></div>
        </div>
        <div class="layer-card int-card" id="layer-INT" style="width:165px; box-sizing:border-box; margin:0; transform:none; left:auto;">
          <span class="layer-tag">L3</span><span class="layer-name">中断处理层</span><span class="layer-sub">ISR 中断服务</span>
          <div class="regs" style="margin-top:12px;"><code id="int-state">等待 IRQ...</code></div>
        </div>
      </div>

      <canvas id="particle-canvas" style="position:absolute; inset:0; width:100%; height:100%; pointer-events:none; z-index:5;"></canvas>
    </div>
  </main>

  <aside class="panel-info">
    <div class="info-card" id="proc-card">
      <h3 style="margin-bottom: 10px;">进程状态</h3>
      <code>PID: <span id="proc-pid">8888</span></code>
      <code>状态: <span id="proc-state" class="badge badge-running">运行中</span></code>
      <code id="proc-wait" style="margin-top: 4px; color: var(--amber);"></code>
    </div>
    
    <div class="info-card">
      <h3 style="margin-bottom: 10px;">用户缓冲区 (User Space)</h3>
      <div class="ubuf-scroll" id="ubuf-display" style="min-height: 80px;"></div>
      <code>已接收长度: <span id="ubuf-len">0</span> 字节</code>
    </div>
    
    <div class="info-card" id="err-card">
      <h3 style="margin-bottom: 10px;">内核差错控制台</h3>
      <code id="err-msg">等待指令...</code>
    </div>
    
    <div class="info-card log-card">
      <h3 style="margin-bottom: 10px;">系统调用日志</h3>
      <div class="log-scroll" id="step-log"></div>
    </div>
  </aside>
</div>

<script src="bundle.js"></script>
<script src="app.js"></script>
</body>
</html>
