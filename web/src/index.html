<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OS I/O 模拟器 — VFS 与双缓冲 demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <div class="topbar-left">
    <span class="logo">IO::SIM</span>
    <span class="version">v1.0</span>
  </div>
  <div class="topbar-center">
    <button id="btn-connect" class="btn btn-primary">🔌 连接后端</button>
    <button id="btn-init" class="btn btn-accent" disabled>● 发起读取</button>
    <button id="btn-step" class="btn" disabled>▶ 下一步</button>
    <button id="btn-autoplay" class="btn btn-warn hidden">⚡ 自动连点</button>
  </div>
  <div class="topbar-right">
    <span id="conn-status" class="conn-status disconnected">● 未连接</span>
  </div>
</header>

<div class="main-grid">
  <!-- 左侧：控制面板 -->
  <aside class="panel-control">
    <h2 class="panel-title">请求配置</h2>

    <div class="field">
      <label>后端地址</label>
      <div class="row-input">
        <input type="text" id="cfg-host" class="inp" value="http://localhost:18083" style="flex:1">
      </div>
    </div>

    <div class="field">
      <label>用户身份</label>
      <select id="sel-user" class="sel full">
        <option value="user1">👤 普通用户 (uid=1000)</option>
        <option value="root">🔒 Root 用户 (uid=0)</option>
      </select>
    </div>

    <hr>

    <div class="field">
      <label>文件路径</label>
      <select id="cfg-path" class="sel full">
        <option value="/home/user1/notes.txt">/home/user1/notes.txt（普通文件）</option>
        <option value="/etc/shadow">/etc/shadow（系统敏感文件）</option>
        <option value="../../etc/shadow">../../etc/shadow（路径穿越）</option>
        <option value="/tmp/data.bin">/tmp/data.bin（散设备文件）</option>
        <option value="/nonexistent">/nonexistent（文件不存在）</option>
      </select>
    </div>

    <div class="field">
      <label>读取字节数：<strong id="val-bytes">16384</strong></label>
      <input type="range" id="cfg-bytes" min="100" max="65536" value="16384" step="100">
    </div>

    <div class="field">
      <label>用户缓冲区地址：<code id="val-addr">0x10000000</code></label>
      <select id="cfg-addr" class="sel full">
        <option value="0x10000000">0x10000000（安全）</option>
        <option value="0xFFFFFFFF">0xFFFFFFFF（非法越界）</option>
      </select>
    </div>

    <div class="field row">
      <label>双缓冲 (Ping-Pong)</label>
      <label class="toggle">
        <input type="checkbox" id="cfg-dblbuf" checked>
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
        <span id="lbl-dblbuf" class="toggle-label">开</span>
      </label>
    </div>

    <div class="field">
      <label>注入故障</label>
      <select id="cfg-fault" class="sel full">
        <option value="0">无</option>
        <option value="1">权限拒绝 (EACCES)</option>
        <option value="2">非法地址 (EFAULT)</option>
        <option value="3">硬件超时 (EIO)</option>
        <option value="4">路径穿越 (EFAULT)</option>
        <option value="5">文件不存在 (ENOENT)</option>
      </select>
    </div>
  </aside>

  <!-- 中间：5 层拓扑 + SVG 连线 -->
  <main class="panel-topology">
    <svg class="topo-svg" viewBox="0 0 400 750" preserveAspectRatio="xMidYMid meet">
      <defs>
        <marker id="arrow-down" markerWidth="8" markerHeight="8" refX="4" refY="8" orient="auto">
          <path d="M0,0 L8,4 L0,8 Z" fill="#94a3b8"/>
        </marker>
        <marker id="arrow-down-active" markerWidth="8" markerHeight="8" refX="4" refY="8" orient="auto">
          <path d="M0,0 L8,4 L0,8 Z" fill="#2563eb"/>
        </marker>
        <filter id="glow-active">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- 用户层 → VFS -->
      <line x1="200" y1="80" x2="200" y2="145" class="connector" id="conn-u-v"/>
      <!-- VFS → 驱动层 -->
      <line x1="200" y1="260" x2="200" y2="315" class="connector" id="conn-v-d"/>
      <!-- 驱动层 → 硬件层 -->
      <line x1="140" y1="400" x2="80" y2="470" class="connector" id="conn-d-h"/>
      <!-- 硬件层 → 中断层 -->
      <line x1="260" y1="470" x2="320" y2="400" class="connector" id="conn-h-i"/>
      <!-- 乒乓回溯虚线 -->
      <path d="M340,560 C390,560 390,360 340,360" class="connector loopback" id="conn-i-d" fill="none"/>

      <foreignObject x="130" y="160" width="140" height="24">
        <div class="conn-label" id="irp-label">IRP ↓</div>
      </foreignObject>
      <foreignObject x="310" y="490" width="90" height="24">
        <div class="conn-label" id="irq-label">IRQ ↑</div>
      </foreignObject>
    </svg>

    <!-- 用户层 -->
    <div class="layer-card" id="layer-USER" style="top:24px;left:50%;">
      <span class="layer-tag">L0</span>
      <span class="layer-name">用户空间</span>
      <span class="layer-sub">sys_read(fd, buf, len)</span>
    </div>
    <!-- 设备无关层 VFS -->
    <div class="layer-card" id="layer-VFS" style="top:150px;left:50%;min-height:90px;height:auto;">
      <span class="layer-tag">L1</span>
      <span class="layer-name">设备无关层 (VFS)</span>
      <span class="layer-sub" id="vfs-desc">等待系统调用...</span>
      <div class="buffers-row" id="vfs-buffers">
        <div class="kbuf" id="kbuf1"><span class="kbuf-label">缓冲 A</span><span class="kbuf-data"></span></div>
        <div class="kbuf" id="kbuf2"><span class="kbuf-label">缓冲 B</span><span class="kbuf-data"></span></div>
      </div>
    </div>
    <!-- 设备驱动层 -->
    <div class="layer-card" id="layer-DRV" style="top:320px;left:50%;">
      <span class="layer-tag">L2</span>
      <span class="layer-name">设备驱动层</span>
      <span class="layer-sub" id="drv-desc">等待 IRP...</span>
      <div class="pbar-wrap"><div class="pbar-fill" id="pbar"></div></div>
      <span class="chunk-stat" id="chunk-stat">0 / 1</span>
    </div>
    <!-- 硬件层 + 中断层 -->
    <div class="hw-int-row">
      <div class="layer-card hw-card" id="layer-HW">
        <span class="layer-tag">L4</span>
        <span class="layer-name">硬件层 (磁盘)</span>
        <span class="layer-sub">磁盘控制器</span>
        <div class="regs">
          <code id="hw-cmd">CMD: NO_OP</code>
          <code id="hw-status">STS: READY</code>
        </div>
      </div>
      <div class="layer-card int-card" id="layer-INT">
        <span class="layer-tag">L3</span>
        <span class="layer-name">中断处理层</span>
        <span class="layer-sub">ISR 中断服务</span>
        <div class="regs">
          <code id="int-state">等待 IRQ...</code>
        </div>
      </div>
    </div>
    <canvas id="particle-canvas"></canvas>
  </main>

  <!-- 右侧：信息面板 -->
  <aside class="panel-info">
    <!-- 进程状态 -->
    <div class="info-card" id="proc-card">
      <h3>进程状态</h3>
      <code>PID: <span id="proc-pid">8888</span></code>
      <code>状态: <span id="proc-state" class="badge badge-running">运行中</span></code>
      <code id="proc-wait"></code>
    </div>
    <!-- 用户缓冲区 -->
    <div class="info-card">
      <h3>用户缓冲区</h3>
      <div class="ubuf-scroll" id="ubuf-display"></div>
      <code>长度: <span id="ubuf-len">0</span> 字节</code>
    </div>
    <!-- 差错控制台 -->
    <div class="info-card" id="err-card">
      <h3>差错控制台</h3>
      <code id="err-msg">等待指令...</code>
    </div>
    <!-- 步骤日志 -->
    <div class="info-card">
      <h3>步骤日志</h3>
      <div class="log-scroll" id="step-log"></div>
    </div>
  </aside>
</div>

<script src="bundle.js"></script>
<script src="app.js"></script>
</body>
</html>
